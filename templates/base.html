<!DOCTYPE html>
<html>
<head>
    <title>Smart Investment Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .metric-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .recommendation-box {
            margin-top: 30px;
            padding: 25px;
            font-size: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .buy { background:#064e3b; color:#22c55e; }
        .hold { background:#78350f; color:#facc15; }
        .avoid { background:#7f1d1d; color:#ef4444; }

        canvas {
            margin-top: 40px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Smart Advisor</a>
    <div>
        {% if session.get("user") %}
            <a class="btn btn-outline-light me-2" href="/dashboard">Dashboard</a>
            <a class="btn btn-danger" href="/logout">Logout</a>
        {% else %}
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-success" href="/signup">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
