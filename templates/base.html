<!DOCTYPE html>
<html>
<head>
    <title>Smart Investment Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
    body {
        background: linear-gradient(135deg, #0f172a, #0b1220);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Navbar Upgrade */
    .navbar {
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Metric Cards */
    .metric-card {
        background: linear-gradient(145deg, #1e293b, #172033);
        padding: 25px;
        border-radius: 14px;
        text-align: center;
        flex: 1;
        transition: 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .metric-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .cards {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 30px;
    }

    /* Recommendation Box */
    .recommendation-box {
        margin-top: 30px;
        padding: 30px;
        font-size: 28px;
        border-radius: 16px;
        text-align: center;
        font-weight: bold;
        letter-spacing: 1px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        animation: fadeIn 0.6s ease-in-out;
    }

    .buy { 
        background: linear-gradient(135deg,#064e3b,#065f46); 
        color:#22c55e; 
    }

    .hold { 
        background: linear-gradient(135deg,#78350f,#92400e); 
        color:#facc15; 
    }

    .avoid { 
        background: linear-gradient(135deg,#7f1d1d,#991b1b); 
        color:#ef4444; 
    }

    /* Charts */
    canvas {
        margin-top: 40px;
        background: linear-gradient(145deg, #1e293b, #172033);
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    /* Flash Message Styling */
    .custom-alert {
        background: #1e293b;
        border-left: 5px solid #22c55e;
        color: #22c55e;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: 500;
        animation: fadeIn 0.5s ease-in-out;
    }

    /* Buttons Upgrade */
    .btn {
        border-radius: 30px;
        padding-left: 20px;
        padding-right: 20px;
        transition: 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
    }

    /* Smooth Fade Animation */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Smart Advisor</a>
    <div>
        {% if session.get("user") %}
            <a class="btn btn-outline-light me-2" href="/dashboard">Dashboard</a>
            <a class="btn btn-danger" href="/logout">Logout</a>
        {% else %}
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-success" href="/signup">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

    <!-- ✅ Flash Messages (Buy / Wishlist Success) -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="custom-alert">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
